name: Clojure CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: please03
          POSTGRES_USER: adm_user
          POSTGRES_DB: adm_user
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8
        options: >-
          --health-cmd "redis-cli -a please04 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.3
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          lein: 2.12.0
          clj-kondo: 2026.01.19
      - name: Install dependencies
        run: lein deps
      - name: Lint with clj-kondo
        uses: DeLaGuardo/clojure-lint-action@master
        with:
          clj-kondo-args: --lint src:test
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run ClojureScript tests
        run: lein fig:test
        env:
          SESSION_SECRET: ci-secret-16byte
      - name: Set up the database
        run: lein with-profile +test do create-sql, migrate, migrate-auxiliary, partition 2015-01-01 2017-12-31
      - name: Run tests
        run: lein cloverage
        env:
          REDIS_PASSWORD: ""
          SESSION_SECRET: ci-secret-16byte

  tag:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6.0.3

      - name: Tag with the version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  publish-prep:
    needs: tag
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.set-time.outputs.timestamp }}
    steps:
      - name: Generate timestamp
        id: set-time
        run: echo "timestamp=$(date + '%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

  publish:
    needs: [tag, publish-prep]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: web
            image: dgknght/clj-money-web
          - target: util
            image: dgknght/clj-money-util
    env:
      DOCKER_METADATA_PR_HEAD_SHA: true
      SHARED_TIMESTAMP: ${{ needs.prep.outputs.timestamp }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6.0.3

      - name: Log into docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract tags and labels
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{ env.SHARED_TIMESTAMP }},enable={{is_default_branch}}
            type=sha,prefix=
          flavor: |
            latest=false

      - name: Build and push the docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.output.labels }}
